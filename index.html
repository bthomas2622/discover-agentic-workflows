<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Agentic Workflows</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Discover Agentic Workflows</h1>

    </main>

      <p>Workflows from <a href="https://github.com/github/gh-aw/tree/v0.65.7/.github/workflows" target="_blank" rel="noopener">github/gh-aw</a> &middot; <a href="https://github.github.com/gh-aw/" target="_blank" rel="noopener">Documentation</a></p>
    </footer>

  <script src="app.js"></script>
</body>
</html>
